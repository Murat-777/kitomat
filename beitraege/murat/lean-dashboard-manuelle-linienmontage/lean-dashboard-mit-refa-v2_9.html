*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(37,99,235,.14),transparent 34rem),radial-gradient(circle at top right,rgba(15,118,110,.10),transparent 28rem),var(--bg);line-height:1.45}button,input,textarea,select{font:inherit}.app{max-width:1500px;margin:0 auto;padding:22px}.hero{background:linear-gradient(135deg,#0f172a,#1e3a8a 56%,#0f766e);color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);overflow:hidden;position:relative}.hero-grid{display:grid;grid-template-columns:1.35fr .65fr;gap:24px;position:relative;z-index:1}.eyebrow{display:inline-flex;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.10);padding:7px 11px;border-radius:999px;font-size:13px;font-weight:800;letter-spacing:.02em}h1{font-size:clamp(30px,4vw,54px);line-height:1.04;margin:18px 0 12px;letter-spacing:-.04em}.subtitle{font-size:17px;max-width:850px;color:rgba(255,255,255,.86);margin:0}.hero-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:22px;padding:18px}.hero-card strong{display:block;font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.72);margin-bottom:12px}.hero-card ul{margin:0;padding-left:18px;color:rgba(255,255,255,.88)}.top-actions,.toolbar,.safety-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.top-actions{margin-top:22px}.btn{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:850;display:inline-flex;align-items:center;gap:8px;text-decoration:none;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}.btn:hover{transform:translateY(-1px)}.btn.primary{background:#fff;color:#0f172a;box-shadow:0 12px 24px rgba(0,0,0,.16)}.btn.secondary{background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.24)}.btn.blue{background:var(- in-width:78px}.employee-assessment-fields input[type="text"]{text-align:left}.employee-full-detail{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}.employee-full-detail .nva-detail-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.employee-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:8px}.employee-lean{margin-top:8px}.employee-lean .lean-principles{min-width:0}.employee-note{font-size:11px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:7px}.station-summary-card{min-width:360px;display:grid;gap:9px}.station-summary-title{font-size:12px;font-weight:950;color:#1e3a8a}.station-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.station-summary-detail{border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px;display:grid;gap:4px}.station-summary-detail-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;border-bottom:1px dashed #e2e8f0;padding-bottom:3px}.station-summary-detail-row:last-child{border-bottom:0;padding-bottom:0}.station-summary-note{font-size:11px;color:var(--muted);background:#f8fafc;border:1px dashed var(--line);border-radius:10px;padding:7px}.delta-ok{color:var(--green)}.delta-warn{color:var(--warn)}.delta-red{color:var(--red)}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900;white-space:nowrap}.pill.green{background:#dcfce7;color:#166534}.pill.yellow{background:#fef3c7;color:#92400e}.pill.red{background:#fee2e2;color:#991b1b}.pill.blue{background:#e0f2fe;color:#075985}.pill.grey{background:#f1f5f9;color:#475569}.charts{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.chart-card{border:1px solid var(--line);border-radius:16px;background:var(--surface2);padding:14px;min-height:330px}.chart-card h3{margin:0 0 3px;font-size:17px}.chart-card p{margin:0 0 12px;color:var(--muted);font-size:13px}svg{width:100%;heigh min-height:260px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}.onepager-box{display:none;margin-top:14px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px}.onepager-box.active{display:block}.onepager-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}.onepager-title h3{margin:0 0 4px;font-size:22px;letter-spacing:-.02em}.onepager-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}.onepager-kpi{border:1px solid var(--line);border-radius:14px;background:#f8fafc;padding:12px}.onepager-kpi strong{display:block;font-size:24px;letter-spacing:-.03em}.onepager-kpi span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:900}.onepager-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.onepager-card{border:1px solid var(--line);border-radius:16px;background:#f8fafc;padding:13px}.onepager-card h4{margin:0 0 8px;font-size:15px}.onepager-list{margin:0;padding-left:18px}.onepager-list li{margin:4px 0}.todo-bars{display:grid;gap:8px}.todo-bar-row{display:grid;grid-template-columns:120px 1fr 52px;gap:8px;align-items:center;font-size:12px}.todo-bar-bg{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden}.todo-bar-fill{height:100%;background:#2563eb;border-radius:999px}.todo-bar-fill.done{background:#15803d}.todo-bar-fill.progress{background:#d97706}.todo-bar-fill.open{background:#64748b}.todo-bar-fill.overdue{background:#b91c1c}.onepager-note{font-size:12px;color:var(--muted);margin-top:10px}.onepager-actions{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:900px){.onepager-kpis,.onepager-grid{grid-template-columns:1fr}}@media(max-width:1100px){.hero-grid,.grid.two,.grid.four,.charts,.insight-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.checklist
